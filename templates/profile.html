<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Account</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/profile.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

    <div class="logo">
        Emotion AI
    </div>

    <a href="/" class="home-btn">
        ← Back to Home
    </a>

</div>

<!-- ================= MAIN ================= -->

<div class="container">

<div class="card">

    <h1 class="title">Manage Account</h1>

    <form method="POST" enctype="multipart/form-data">

        <!-- PROFILE IMAGE -->

        <div class="profile-box">

            {% if user['photo'] %}
            <img src="{{ url_for('static', filename=user['photo']) }}"
                 class="profile-img">
            {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                 class="profile-img">
            {% endif %}

            <br>

            <label class="upload-btn">

                Change Profile Photo

                <input type="file" name="photo">

            </label>

        </div>

        <!-- FULL NAME -->

        <div class="form-group">

            <label>Full Name</label>

            <input type="text"
                   name="full_name"
                   value="{{ user['full_name'] }}">

        </div>

        <!-- EMAIL -->

        <div class="form-group">

            <label>Email</label>

            <input type="email"
                   value="{{ user['email'] }}"
                   readonly>

        </div>

        <!-- PASSWORD -->

        <div class="form-group">

            <label>New Password</label>

            <div class="input-box">

                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Enter new password">

                <span class="eye"
                      onclick="togglePassword('password', this)">
                      👁️
                </span>

            </div>

        </div>

        <!-- CONFIRM PASSWORD -->

        <div class="form-group">

            <label>Confirm Password</label>

            <div class="input-box">

                <input type="password"
                       id="confirmPassword"
                       name="confirm_password"
                       placeholder="Confirm password">

                <span class="eye"
                      onclick="togglePassword('confirmPassword', this)">
                      👁️
                </span>

            </div>

        </div>

        <!-- BUTTON -->

        <button type="submit" class="save-btn">
            Save Changes
        </button>

        <a href="/login" class="login-btn">
            Back to Login
        </a>

    </form>

</div>
</div>

<script>

function togglePassword(id, icon){

    const input = document.getElementById(id);

    if(input.type === "password"){

        input.type = "text";
        icon.innerHTML = "🙈";

    }else{

        input.type = "password";
        icon.innerHTML = "👁️";
    }
}

</script>

</body>
</html>
