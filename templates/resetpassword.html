<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<style>
body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
font-family:Poppins;
}

.box{
background:#020617;
padding:30px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<form action="/reset" method="post">

<input type="text" name="user" placeholder="Email or Mobile" required>

<button type="submit">Send Reset Link</button>

</form>

</div>

</body>
</html>
