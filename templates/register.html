<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Emotion Detection</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Segoe UI', Poppins, sans-serif;
  padding:20px;
  color:white;
}

/* Toast */
.toast {
  position:fixed; top:20px; right:20px;
  padding:12px 20px; border-radius:10px;
  font-size:14px; font-weight:600;
  z-index:9999; display:none; max-width:300px;
  line-height:1.5;
}
.toast.success { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.4); color:#22c55e; }
.toast.error   { background:rgba(239,68,68,0.15);  border:1px solid rgba(239,68,68,0.4);  color:#ef4444; }

/* Loader */
.loader-overlay {
  position:fixed; inset:0; background:#020617;
  z-index:99999; display:none;
  flex-direction:column; align-items:center;
  justify-content:center; gap:20px;
}
.loader-overlay.show { display:flex; }
.loader-ring {
  width:56px; height:56px;
  border:3px solid rgba(37,99,235,0.2);
  border-top-color:#2563eb;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
.loader-text { font-size:14px; color:#64748b; letter-spacing:1px; }
@keyframes spin { to { transform:rotate(360deg); } }

.box {
  background:#020617;
  padding:36px 32px;
  border-radius:18px;
  width:100%; max-width:440px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h2 {
  text-align:center;
  margin-bottom:6px;
  font-size:26px; font-weight:700;
}
.sub {
  text-align:center; font-size:13px;
  color:#64748b; margin-bottom:24px;
}

/* Profile photo */
.photo-area {
  display:flex; flex-direction:column;
  align-items:center; gap:10px;
  margin-bottom:20px;
}
.photo-circle {
  width:84px; height:84px; border-radius:50%;
  border:2px dashed rgba(255,255,255,0.15);
  background:#111827;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; overflow:hidden;
  position:relative; transition:border-color 0.2s;
}
.photo-circle:hover { border-color:#2563eb; }
.photo-circle img {
  width:100%; height:100%;
  object-fit:cover; border-radius:50%;
  display:none;
}
.photo-icon {
  display:flex; flex-direction:column;
  align-items:center; gap:4px;
}
.photo-icon svg { width:26px; height:26px; stroke:#475569; fill:none; stroke-width:1.5; }
.photo-icon span { font-size:9px; color:#475569; letter-spacing:1px; text-transform:uppercase; }
.photo-edit {
  position:absolute; bottom:2px; right:2px;
  width:22px; height:22px; border-radius:50%;
  background:#2563eb; border:2px solid #020617;
  display:none; align-items:center; justify-content:center;
}
.photo-edit svg { width:10px; height:10px; stroke:white; fill:none; stroke-width:2.5; }
.photo-hint { font-size:11px; color:#475569; }
#photoInput { display:none; }

/* Form */
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; color:#94a3b8; margin-bottom:6px; letter-spacing:0.5px; }
.field input {
  width:100%; padding:12px 14px;
  border:1px solid #1e293b;
  border-radius:10px;
  background:#111827; color:white;
  font-size:14px; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}
.field input::placeholder { color:#334155; }

.checkbox-row {
  display:flex; align-items:center; gap:10px;
  margin-bottom:18px;
}
.checkbox-row input[type=checkbox] {
  width:16px; height:16px;
  accent-color:#2563eb; cursor:pointer;
}
.checkbox-row label { font-size:13px; color:#94a3b8; cursor:pointer; }
.checkbox-row a { color:#3b82f6; text-decoration:none; }

.btn-submit {
  width:100%; padding:13px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:white; border:none; border-radius:10px;
  font-size:15px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
  letter-spacing:0.3px;
}
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(37,99,235,0.4); }

/* Divider */
.divider {
  display:flex; align-items:center;
  gap:12px; margin:20px 0;
  color:#334155; font-size:13px;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px;
  background:#1e293b;
}

/* Social buttons — FIXED */
.social { display:flex; gap:12px; }

.social-btn {
  flex:1; height:48px;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:12px;
  display:flex; align-items:center;
  justify-content:center; gap:10px;
  color:#e2eaff; font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
  white-space:nowrap; /* ✅ text ek line mein rahega */
  padding:0 16px;
}
.social-btn:hover { transform:translateY(-2px); }
.social-btn.google:hover {
  border-color:#ea4335;
  box-shadow:0 0 18px rgba(234,67,53,0.2);
}
.social-btn.facebook:hover {
  border-color:#1877f2;
  box-shadow:0 0 18px rgba(24,119,242,0.2);
}
.social-btn img {
  width:20px; height:20px;
  flex-shrink:0; /* ✅ image squeeze nahi hogi */
}
.social-btn span {
  font-size:13px; /* ✅ slightly smaller text */
}

.login-link {
  text-align:center; margin-top:20px;
  font-size:13px; color:#64748b;
}
.login-link a { color:#3b82f6; text-decoration:none; font-weight:600; }
.login-link a:hover { text-decoration:underline; }
</style>
</head>
<body>

<!-- Loader -->
<div class="loader-overlay" id="loaderOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loaderText">Creating account...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="box">

  <h2>Create Account</h2>
  <p class="sub">Join Emotion Detection for free</p>

  <!-- Profile Photo -->
  <div class="photo-area">
    <div class="photo-circle" onclick="document.getElementById('photoInput').click()">
      <img id="photoPreview" src="" alt="Profile" />
      <div class="photo-icon" id="photoIcon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Add Photo</span>
      </div>
      <div class="photo-edit" id="photoEdit">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
    </div>
    <span class="photo-hint">Profile photo (optional)</span>
    <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(this)" />
  </div>

  <form id="registerForm" onsubmit="doRegister(event)">

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Your full name" required />
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="reg-email" placeholder="you@example.com" required />
    </div>

    <div class="field">
      <label>Mobile Number</label>
      <input type="tel" id="reg-mobile" placeholder="+91 98765 43210" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min 6 characters" required />
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="reg-confirm" placeholder="Repeat your password" required />
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="terms" required />
      <label for="terms">I agree to <a href="#">Terms & Conditions</a></label>
    </div>

    <button type="submit" class="btn-submit">Create Account</button>

  </form>

  <div class="divider">or register with</div>

  <!-- Social buttons FIXED -->
  <div class="social">
    <button type="button" class="social-btn google" onclick="socialMsg('Google')">
      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google" />
      <span>Google</span>
    </button>
    <button type="button" class="social-btn facebook" onclick="socialMsg('Facebook')">
      <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook" />
      <span>Facebook</span>
    </button>
  </div>

  <div class="login-link">
    Already have an account? <a href="/login">Sign In</a>
  </div>

</div>

<script>
  function showToast(msg, type='error') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast '+type;
    t.style.display = 'block';
    setTimeout(() => t.style.display='none', 3500);
  }

  function showLoader(text) {
    document.getElementById('loaderText').textContent = text;
    document.getElementById('loaderOverlay').classList.add('show');
  }
  function hideLoader() {
    document.getElementById('loaderOverlay').classList.remove('show');
  }

  // Profile photo preview
  function previewPhoto(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('photoPreview');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('photoIcon').style.display = 'none';
      document.getElementById('photoEdit').style.display = 'flex';
    };
    reader.readAsDataURL(input.files[0]);
  }

  // Register
  async function doRegister(e) {
    e.preventDefault();

    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const mobile   = document.getElementById('reg-mobile').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const terms    = document.getElementById('terms').checked;
    const photo    = document.getElementById('photoInput').files[0];

    if (!name || !email || !password) { showToast('❌ Sabhi fields fill karo!'); return; }
    if (!terms)             { showToast('❌ Terms accept karo!'); return; }
    if (password.length<6)  { showToast('❌ Password kam se kam 6 characters!'); return; }
    if (password !== confirm){ showToast('❌ Passwords match nahi!'); return; }

    showLoader('Creating account...');

    const fd = new FormData();
    fd.append('full_name',        name);
    fd.append('email',            email);
    fd.append('mobile',           mobile);
    fd.append('password',         password);
    fd.append('confirm_password', confirm);
    if (photo) fd.append('photo', photo);

    try {
      const res  = await fetch('/signup', { method:'POST', body:fd });
      const data = await res.json();

      if (data.success) {
        document.getElementById('loaderText').textContent = '🎉 Account ban gaya!';
        setTimeout(() => {
          hideLoader();
          window.location.href = '/login';
        }, 1200);
      } else {
        hideLoader();
        showToast(data.message, 'error');
      }
    } catch(err) {
      hideLoader();
      showToast('❌ Server error ?', 'error');
    }
  }

  function socialMsg(provider) {
    showToast(`⚠️ ${provider} login ke liye OAuth configure karna hoga.`, 'error');
  }
</script>

</body>
</html>
